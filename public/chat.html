<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>💬 Chat - 691 Lisboa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --background: #0a0a0a;
            --background-light: #1a1a1a;
            --primary: #004d00;
            --primary-light: #00cc44;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --border: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: var(--background-light);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text);
        }

        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--background);
        }

        .chat-message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: slideInUp 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .chat-message.client {
            align-self: flex-end;
            background: var(--primary);
            color: var(--text);
            border-bottom-right-radius: 6px;
        }

        .chat-message.driver {
            align-self: flex-start;
            background: rgba(255,255,255,0.08);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.12);
            border-bottom-left-radius: 6px;
        }

        .chat-message strong {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .chat-message.client strong {
            color: var(--text);
        }

        .chat-message.driver strong {
            color: var(--primary-light);
        }

        .chat-message .time {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 6px;
            text-align: right;
        }

        .chat-input {
            padding: 16px 20px;
            background: var(--background-light);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .chat-input form {
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 0.9rem;
            background: var(--background);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        .chat-input input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-input input::placeholder {
            color: var(--text-muted);
        }

        .chat-input button {
            padding: 12px 20px;
            background: var(--primary);
            color: var(--text);
            border: none;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-input button:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        .chat-placeholder {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .chat-header { padding: 12px 16px; }
            .chat-messages { padding: 12px; gap: 10px; }
            .chat-message { padding: 10px 14px; }
            .chat-input { padding: 12px 16px; }
            .chat-input form { gap: 8px; }
            .chat-input input { padding: 10px 14px; font-size: 0.85rem; }
            .chat-input button { padding: 10px 16px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="chat-messages">
        <div class="chat-placeholder">Esta funcionalidade foi removida.</div>
        <div class="chat-placeholder"><a href="/" style="color: var(--primary-light); text-decoration: none; font-weight: 700;">Voltar ao início</a></div>
    </div>
    <script>
        window.location.replace('/');
    </script>
</body>
</html>

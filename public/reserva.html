<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>691 — Reserva Ativa</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <style>
    :root {
      --oled: rgba(0, 0, 0, 0.88);
      --border: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.7);
      --accent: #00cc44;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; width: 100%; background: #000; }

    /* Full-screen Leaflet map */
    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    /* Ensure map controls aren't covered by footer */
    .leaflet-control-container .leaflet-bottom {
      bottom: 110px;
    }

    /* Bottom footer bar - single square block */
    .trip-footer {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      z-index: 5;
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      background: #000;
      border: 1px solid rgba(0, 77, 0, 0.4);
      border-radius: 12px 12px 0 0;
      margin: 0 8px;
      width: calc(100% - 16px);
      max-width: 400px;
    }

    .trip-footer-inner {
      max-width: 560px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: center;
      justify-items: center;
    }

    .trip-status {
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      text-align: center;
    }

    .footer-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    .action-btn {
      height: 48px;
      min-width: 48px;
      padding: 0 16px;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 700;
      font-size: 14px;
      line-height: 1;
      transition: transform 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .action-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Slightly more compact on small screens */
    @media (max-width: 420px) {
      .trip-footer { padding: 12px 12px calc(12px + env(safe-area-inset-bottom)); }
      .action-btn { height: 46px; padding: 0 14px; }
      .trip-status { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="trip-footer" role="contentinfo">
    <div class="trip-footer-inner">
      <div id="trip-status" class="trip-status">Motorista a caminho</div>
      <div class="footer-actions">
        <a class="action-btn" href="tel:+351923255691" aria-label="Chamar +351 923 255 691" title="+351 923 255 691">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.61 4.42 2 2 0 0 1 3.6 2.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 17z" />
          </svg>
          <span id="btn-call-label">Chamada</span>
        </a>

        <a class="action-btn" href="https://wa.me/351923255691" target="_blank" rel="noopener" aria-label="Abrir WhatsApp" title="WhatsApp: +351 923 255 691">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.149-.67.149-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 001.171 1.171 11.823 11.823 0 000 12.005c0 2.016.513 3.986 1.49 5.735L.057 23.5l5.787-1.518a11.823 11.823 0 005.674 1.444h.005c6.517 0 11.832-5.315 11.834-11.83a11.739 11.739 0 00-3.438-8.343"/>
          </svg>
          <span id="btn-signal-label">WhatsApp</span>
        </a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const forceLang = params.get('lang');
    const lang = (forceLang === 'en' || forceLang === 'pt')
      ? forceLang
      : (navigator.language || '').toLowerCase().startsWith('en') ? 'en' : 'pt';

    const t = {
      pt: { status: 'Motorista a caminho', call: 'Chamada', signal: 'Signal' },
      en: { status: 'Driver is on the way', call: 'Call', signal: 'Signal' }
    }[lang];

    document.documentElement.lang = lang;
    document.getElementById('trip-status').textContent = t.status;
    const callLabel = document.getElementById('btn-call-label');
    if (callLabel) callLabel.textContent = t.call;
    const signalLabel = document.getElementById('btn-signal-label');
    if (signalLabel) signalLabel.textContent = t.signal;

    // bookingId from URL path: /reserva/:id (served by server) OR query fallback
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const bookingIdFromPath = pathParts.length >= 2 && pathParts[0] === 'reserva' ? pathParts[1] : '';
    const bookingId = bookingIdFromPath || params.get('id') || '';

    // Leaflet map
    const map = L.map('map', { zoomControl: true, attributionControl: false });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
    map.setView([38.7169, -9.1399], 13);

    let driverMarker = null;

    function updateDriverMarker(lat, lng) {
      const icon = L.divIcon({
        className: '',
        html: '<div style="background:#facc15;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 10px rgba(250,204,21,0.45)"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });

      if (driverMarker) {
        driverMarker.setLatLng([lat, lng]);
      } else {
        driverMarker = L.marker([lat, lng], { icon }).addTo(map);
      }
      map.setView([lat, lng], Math.max(map.getZoom(), 15));
    }

    // Socket.IO tracking only
    const socket = io();

    // Reuse existing clientId (same strategy as main app)
    let clientId = localStorage.getItem('691_clientId');
    if (!clientId) {
      clientId = 'client-' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('691_clientId', clientId);
    }

    socket.on('connect', () => {
      // Join room and restore session so server will emit tracking_update to this client
      socket.emit('register_client', { clientId });
      socket.emit('restore_session', { clientId });
    });

    socket.on('tracking_update', (data) => {
      if (!data || !data.bookingId) return;
      if (bookingId && data.bookingId !== bookingId) return;
      updateDriverMarker(data.lat, data.lng);
    });

    // If you want to debug quickly on mobile, uncomment:
    // socket.on('connect_error', (e) => console.log('socket connect_error', e));
  </script>
</body>
</html>

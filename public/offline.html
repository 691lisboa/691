<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>691 Lisboa — Sem Ligação</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 24px;
        }
        .logo {
            font-size: 4rem;
            font-weight: 900;
            color: #00cc44;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(0,204,68,0.4);
        }
        .icon {
            width: 64px;
            height: 64px;
            opacity: 0.5;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50%       { opacity: 0.7; transform: scale(1.05); }
        }
        .title {
            font-size: 1.25rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }
        .sub {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
            max-width: 280px;
            line-height: 1.6;
        }
        .retry-btn {
            margin-top: 8px;
            padding: 14px 36px;
            background: #004d00;
            color: #fff;
            border: 1px solid rgba(0,204,68,0.3);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: filter 0.2s, transform 0.15s;
        }
        .retry-btn:hover {
            filter: brightness(1.4);
            transform: translateY(-1px);
        }
        .contact {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .contact-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .contact a {
            color: rgba(0,204,68,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .contact a:hover { color: #00cc44; }
    </style>
</head>
<body>
    <div class="logo">691</div>

    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="rgba(0,204,68,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="rgba(0,204,68,0.6)"/>
    </svg>

    <div class="title">Sem ligação à internet</div>
    <p class="sub">O servidor 691 está temporariamente inacessível. Verifica a tua ligação e tenta novamente.</p>

    <button class="retry-btn" onclick="window.location.reload()">Tentar novamente</button>

    <div class="contact">
        <span class="contact-label">Reservas por telefone</span>
        <a href="tel:+351923255691">+351 923 255 691</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>691 Taxi - Serviço Premium</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .form-card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #004d00;
            border-radius: 20px;
            padding: 40px 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 77, 0, 0.3),
                        inset 0 0 20px rgba(0, 77, 0, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #004d00;
            margin-bottom: 5px;
        }

        .logo p {
            color: #004d00;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #004d00;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #004d00;
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .form-group input::placeholder {
            color: #004d00;
            opacity: 0.5;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #004d00;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #006600;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 77, 0, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .cancel-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .cancel-btn:hover {
            background: rgba(255, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #004d00;
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
            max-width: 300px;
        }

        .notification.show {
            transform: translateX(0);
        }

        .language-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #004d00;
            border-radius: 20px;
            padding: 5px;
            display: flex;
            gap: 5px;
        }

        .language-toggle button {
            padding: 8px 15px;
            background: transparent;
            color: #004d00;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .language-toggle button.active {
            background: #004d00;
            color: #ffffff;
        }

        .status-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #004d00;
            font-size: 0.8rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .success-message {
            text-align: center;
            color: #00ff00;
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .success-message.show {
            opacity: 1;
        }

        .booking-info {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .booking-info h3 {
            color: #00ff00;
            margin-bottom: 10px;
        }

        .booking-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .chat-btn {
            flex: 1;
            padding: 12px;
            background: #004d00;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-btn:hover {
            background: #006600;
        }

        .no-bookings {
            text-align: center;
            color: #004d00;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        /* Chat Popup */
        .chat-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .chat-popup.show {
            display: flex;
        }

        .chat-container {
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #004d00;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            height: 80%;
            max-height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #004d00;
            color: #ffffff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            margin: 0;
            font-size: 1.2rem;
        }

        .close-chat {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .close-chat:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
        }

        .chat-message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 10px;
            max-width: 80%;
        }

        .chat-message.client {
            background: rgba(0, 77, 0, 0.3);
            align-self: flex-end;
            margin-left: auto;
        }

        .chat-message.driver {
            background: rgba(0, 100, 0, 0.3);
            align-self: flex-start;
        }

        .chat-message strong {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .chat-message.client strong {
            color: #00ff00;
        }

        .chat-message.driver strong {
            color: #00ff00;
        }

        .chat-message .time {
            font-size: 0.8rem;
            color: #004d00;
            margin-top: 5px;
        }

        .chat-input {
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid #004d00;
        }

        .chat-input form {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #004d00;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #00ff00;
        }

        .chat-input button {
            padding: 12px 20px;
            background: #004d00;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .chat-input button:hover {
            background: #006600;
        }

        .booking-status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .booking-status.pending {
            background: rgba(255, 165, 0, 0.2);
            border: 1px solid #ffa500;
            color: #ffa500;
        }

        .booking-status.accepted {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            color: #00ff00;
        }

        .booking-status.rejected {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
        }
    </style>
</head>
<body>
    <!-- Language Toggle -->
    <div class="language-toggle">
        <button id="pt-btn" class="active">PT</button>
        <button id="en-btn">EN</button>
    </div>

    <!-- Status Indicator -->
    <div class="status-indicator">
        <div class="status-dot"></div>
        <span id="status-text">Conectado</span>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">
        <div id="notification-text">📍 O motorista chegou! Por favor, aguarde.</div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="form-card">
            <div class="logo">
                <h1 id="title">691 Taxi</h1>
                <p id="subtitle">Serviço Premium</p>
            </div>

            <!-- Booking Info -->
            <div id="booking-info" class="booking-info" style="display: none;">
                <h3 id="booking-title">🚕 Reserva Ativa</h3>
                <div id="booking-details"></div>
                <div id="booking-status" class="booking-status pending">
                    ⏳ Aguardando confirmação...
                </div>
                <div class="booking-actions">
                    <button id="chat-btn" class="chat-btn">💬 Chat</button>
                    <button id="cancel-btn" class="cancel-btn">❌ Cancelar</button>
                </div>
            </div>

            <div id="no-bookings" class="no-bookings">
                <span id="no-bookings-text">Sem reservas ativas</span>
            </div>

            <form id="taxi-form">
                <div class="form-group">
                    <label id="name-label" for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label id="phone-label" for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="Seu telefone" required>
                </div>

                <div class="form-group">
                    <label id="pickup-label" for="recolha">Local de Recolha</label>
                    <input type="text" id="recolha" name="recolha" placeholder="Endereço de recolha" required>
                </div>

                <div class="form-group">
                    <label id="dest-label" for="destino">Destino</label>
                    <input type="text" id="destino" name="destino" placeholder="Endereço de destino" required>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">Reservar Taxi</button>
            </form>

            <div id="success-message" class="success-message">
                ✅ Reserva enviada com sucesso!
            </div>
        </div>
    </div>

    <!-- Chat Popup -->
    <div id="chat-popup" class="chat-popup">
        <div class="chat-container">
            <div class="chat-header">
                <h3 id="chat-title">💬 Chat com Motorista</h3>
                <button id="close-chat" class="close-chat">×</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div style="text-align: center; color: #004d00; font-style: italic; padding: 20px;">
                    <span id="chat-placeholder">Nenhuma mensagem ainda</span>
                </div>
            </div>
            <div class="chat-input">
                <form id="chat-form">
                    <input type="text" id="chat-message" placeholder="Digite sua mensagem..." required>
                    <button type="submit">Enviar</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Translations
        const translations = {
            pt: {
                title: '691 Taxi',
                subtitle: 'Serviço Premium',
                nameLabel: 'Nome',
                phoneLabel: 'Telefone',
                pickupLabel: 'Local de Recolha',
                destLabel: 'Destino',
                submitBtn: 'Reservar Taxi',
                statusText: 'Conectado',
                notification: '📍 O motorista chegou! Por favor, aguarde.',
                successMessage: '✅ Reserva enviada com sucesso!',
                chatTitle: '💬 Chat com Motorista',
                chatPlaceholder: 'Nenhuma mensagem ainda',
                chatMessagePlaceholder: 'Digite sua mensagem...',
                bookingTitle: '🚕 Reserva Ativa',
                noBookings: 'Sem reservas ativas',
                bookingPending: '⏳ Aguardando confirmação...',
                bookingAccepted: '✅ Reserva aceita! Motorista a caminho.',
                bookingRejected: '❌ Reserva recusada. Tente novamente.',
                bookingCancelled: '❌ Reserva cancelada.',
                driverArrived: '📍 O motorista chegou! Por favor, aguarde.',
                newBooking: '🚕 Nova reserva recebida!',
                messageFromDriver: '💬 Mensagem do motorista:'
            },
            en: {
                title: '691 Taxi',
                subtitle: 'Premium Service',
                nameLabel: 'Name',
                phoneLabel: 'Phone',
                pickupLabel: 'Pickup Location',
                destLabel: 'Destination',
                submitBtn: 'Book Taxi',
                statusText: 'Connected',
                notification: '📍 The driver has arrived! Please wait.',
                successMessage: '✅ Booking sent successfully!',
                chatTitle: '💬 Chat with Driver',
                chatPlaceholder: 'No messages yet',
                chatMessagePlaceholder: 'Type your message...',
                bookingTitle: '🚕 Active Booking',
                noBookings: 'No active bookings',
                bookingPending: '⏳ Awaiting confirmation...',
                bookingAccepted: '✅ Booking accepted! Driver on the way.',
                bookingRejected: '❌ Booking rejected. Please try again.',
                bookingCancelled: '❌ Booking cancelled.',
                driverArrived: '📍 The driver has arrived! Please wait.',
                newBooking: '🚕 New booking received!',
                messageFromDriver: '💬 Message from driver:'
            }
        };

        let currentLang = 'pt';
        let socket = null;
        let currentBooking = null;

        // Initialize Socket.io
        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('Conectado ao servidor');
                updateStatus('Conectado');
                showNotification('🟢 Conectado ao servidor 691 Taxi!');
            });

            socket.on('disconnect', () => {
                console.log('Desconectado do servidor');
                updateStatus('Desconectado');
                showNotification('🔴 Desconectado do servidor');
            });

            socket.on('driver_arrived', (data) => {
                showNotification(data.message || translations[currentLang].driverArrived);
                playSound();
            });

            socket.on('new_booking', (data) => {
                showNotification(data.message || translations[currentLang].newBooking);
                displayBooking(data);
                playSound();
            });

            socket.on('booking_accepted', (data) => {
                if (currentBooking && currentBooking.bookingId === data.bookingId) {
                    updateBookingStatus('accepted');
                    showNotification(data.message);
                    playSound();
                }
            });

            socket.on('booking_rejected', (data) => {
                if (currentBooking && currentBooking.bookingId === data.bookingId) {
                    updateBookingStatus('rejected');
                    showNotification(data.message);
                    playSound();
                    setTimeout(() => {
                        hideBooking();
                    }, 3000);
                }
            });

            socket.on('booking_cancelled', (data) => {
                if (currentBooking && currentBooking.bookingId === data.bookingId) {
                    showNotification(data.message);
                    hideBooking();
                    playSound();
                }
            });

            socket.on('message_from_driver', (data) => {
                if (currentBooking && currentBooking.bookingId === data.bookingId) {
                    displayChatMessage({
                        name: data.driverName,
                        message: data.message,
                        type: 'driver'
                    });
                    showNotification(translations[currentLang].messageFromDriver + ' ' + data.message);
                    playSound();
                }
            });
        }

        // Update language
        function updateLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('name-label').textContent = t.nameLabel;
            document.getElementById('phone-label').textContent = t.phoneLabel;
            document.getElementById('pickup-label').textContent = t.pickupLabel;
            document.getElementById('dest-label').textContent = t.destLabel;
            document.getElementById('submit-btn').textContent = t.submitBtn;
            document.getElementById('chat-title').textContent = t.chatTitle;
            document.getElementById('chat-placeholder').textContent = t.chatPlaceholder;
            document.getElementById('chat-message').placeholder = t.chatMessagePlaceholder;
            document.getElementById('booking-title').textContent = t.bookingTitle;
            document.getElementById('no-bookings-text').textContent = t.noBookings;
            document.getElementById('status-text').textContent = t.statusText;

            // Update button states
            document.getElementById('pt-btn').classList.toggle('active', lang === 'pt');
            document.getElementById('en-btn').classList.toggle('active', lang === 'en');
        }

        // Display booking info
        function displayBooking(booking) {
            currentBooking = booking;
            const bookingInfo = document.getElementById('booking-info');
            const noBookings = document.getElementById('no-bookings');
            const bookingDetails = document.getElementById('booking-details');
            
            bookingDetails.innerHTML = `
                <strong>🆔 ID: ${booking.bookingId}</strong><br>
                <strong>👤 ${booking.nome}</strong><br>
                📞 ${booking.telefone}<br>
                📍 ${booking.recolha}<br>
                🎯 ${booking.destino}
            `;
            
            bookingInfo.style.display = 'block';
            noBookings.style.display = 'none';
            updateBookingStatus('pending');
        }

        // Update booking status
        function updateBookingStatus(status) {
            const statusElement = document.getElementById('booking-status');
            const t = translations[currentLang];
            
            statusElement.className = 'booking-status ' + status;
            
            switch(status) {
                case 'pending':
                    statusElement.textContent = t.bookingPending;
                    break;
                case 'accepted':
                    statusElement.textContent = t.bookingAccepted;
                    break;
                case 'rejected':
                    statusElement.textContent = t.bookingRejected;
                    break;
                case 'cancelled':
                    statusElement.textContent = t.bookingCancelled;
                    break;
            }
        }

        // Hide booking
        function hideBooking() {
            const bookingInfo = document.getElementById('booking-info');
            const noBookings = document.getElementById('no-bookings');
            
            bookingInfo.style.display = 'none';
            noBookings.style.display = 'block';
            currentBooking = null;
        }

        // Display chat message
        function displayChatMessage(data) {
            const chatMessages = document.getElementById('chat-messages');
            const placeholder = document.getElementById('chat-placeholder');
            
            // Remove placeholder if exists
            if (placeholder) {
                placeholder.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${data.type || 'client'}`;
            messageDiv.innerHTML = `
                <strong>${data.name}</strong>
                <div>${data.message}</div>
                <div class="time">${new Date().toLocaleTimeString()}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Show notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            document.getElementById('notification-text').textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 5000);
        }

        // Play sound
        function playSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Update status
        function updateStatus(text) {
            document.getElementById('status-text').textContent = text;
        }

        // Handle form submission
        document.getElementById('taxi-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                nome: formData.get('nome'),
                telefone: formData.get('telefone'),
                recolha: formData.get('recolha'),
                destino: formData.get('destino')
            };

            try {
                const response = await fetch('/api/reserva', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    console.log('Reserva enviada:', result);
                    
                    // Show success message
                    const successMsg = document.getElementById('success-message');
                    successMsg.classList.add('show');
                    
                    // Display booking with ID from server
                    displayBooking({
                        ...data,
                        bookingId: result.bookingId
                    });
                    
                    // Reset form
                    e.target.reset();
                    
                    // Hide success message after 3 seconds
                    setTimeout(() => {
                        successMsg.classList.remove('show');
                    }, 3000);
                } else {
                    console.error('Erro ao enviar reserva');
                    showNotification('❌ Erro ao enviar reserva');
                }
            } catch (error) {
                console.error('Erro:', error);
                showNotification('❌ Erro de conexão');
            }
        });

        // Handle chat form submission
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = document.getElementById('chat-message').value.trim();
            if (!message || !currentBooking) return;
            
            // Send via Socket.io
            socket.emit('message_to_driver', {
                name: currentBooking.nome,
                phone: currentBooking.telefone,
                bookingId: currentBooking.bookingId,
                message: message
            });
            
            // Display as own message
            displayChatMessage({
                name: 'Você',
                message: message,
                type: 'client'
            });
            
            // Clear form
            document.getElementById('chat-message').value = '';
        });

        // Chat popup controls
        document.getElementById('chat-btn').addEventListener('click', () => {
            document.getElementById('chat-popup').classList.add('show');
        });

        document.getElementById('close-chat').addEventListener('click', () => {
            document.getElementById('chat-popup').classList.remove('show');
        });

        // Cancel booking
        document.getElementById('cancel-btn').addEventListener('click', () => {
            if (currentBooking) {
                socket.emit('cancel_booking', {
                    bookingId: currentBooking.bookingId,
                    name: currentBooking.nome,
                    phone: currentBooking.telefone
                });
                
                updateBookingStatus('cancelled');
                setTimeout(() => {
                    hideBooking();
                }, 2000);
            }
        });

        // Language toggle handlers
        document.getElementById('pt-btn').addEventListener('click', () => {
            updateLanguage('pt');
        });

        document.getElementById('en-btn').addEventListener('click', () => {
            updateLanguage('en');
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initSocket();
            updateLanguage('pt');
        });
    </script>
</body>
</html>

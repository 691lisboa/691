<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>691 Taxi - Serviço Premium</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #0a1a0a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }

        .form-card {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 25px;
            padding: 35px 25px;
            backdrop-filter: blur(25px);
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.2),
                        inset 0 0 30px rgba(0, 255, 0, 0.05);
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: #00ff00;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            letter-spacing: -1px;
        }

        .logo p {
            color: #00ff00;
            opacity: 0.8;
            font-size: 1rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #00ff00;
            font-size: 0.95rem;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 18px 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ff00;
            border-radius: 15px;
            color: #ffffff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            background: rgba(0, 0, 0, 0.8);
            transform: translateY(-2px);
        }

        .form-group input::placeholder {
            color: #00ff00;
            opacity: 0.4;
            font-weight: 400;
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000000;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 25px rgba(0, 255, 0, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 35px rgba(0, 255, 0, 0.5);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .cancel-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2) 0%, rgba(255, 0, 0, 0.3) 100%);
            color: #ff4444;
            border: 2px solid #ff4444;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cancel-btn:hover {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.3) 0%, rgba(255, 0, 0, 0.4) 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 68, 68, 0.3);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000000;
            padding: 18px 22px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
            max-width: 320px;
            font-weight: 600;
        }

        .notification.show {
            transform: translateX(0);
        }

        .language-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 25px;
            padding: 6px;
            display: flex;
            gap: 6px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .language-toggle button {
            padding: 10px 18px;
            background: transparent;
            color: #00ff00;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .language-toggle button.active {
            background: #00ff00;
            color: #000000;
            font-weight: 700;
        }

        .status-indicator {
            position: fixed;
            bottom: 25px;
            left: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00ff00;
            font-size: 0.9rem;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #00ff00;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .success-message {
            text-align: center;
            color: #00ff00;
            margin-top: 18px;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-weight: 600;
        }

        .success-message.show {
            opacity: 1;
        }

        .booking-info {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.1) 0%, rgba(0, 255, 0, 0.05) 100%);
            border: 2px solid #00ff00;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.1);
        }

        .booking-info h3 {
            color: #00ff00;
            margin-bottom: 12px;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .booking-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        .chat-btn {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.4);
        }

        .no-bookings {
            text-align: center;
            color: #00ff00;
            font-size: 1rem;
            margin-bottom: 20px;
            font-style: italic;
            opacity: 0.7;
        }

        /* Autocomplete */
        .autocomplete-container {
            position: relative;
        }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff00;
            border-top: none;
            border-radius: 0 0 15px 15px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .autocomplete-list.show {
            display: block;
        }

        .autocomplete-item {
            padding: 12px 15px;
            color: #ffffff;
            cursor: pointer;
            transition: background 0.2s ease;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(0, 255, 0, 0.1);
        }

        .autocomplete-item:hover {
            background: rgba(0, 255, 0, 0.1);
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        /* Chat Popup */
        .chat-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 15px;
        }

        .chat-popup.show {
            display: flex;
        }

        .chat-container {
            background: rgba(0, 0, 0, 0.98);
            border: 2px solid #00ff00;
            border-radius: 25px;
            width: 100%;
            max-width: 500px;
            height: 85%;
            max-height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.3);
        }

        .chat-header {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000000;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .close-chat {
            background: transparent;
            border: none;
            color: #000000;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 8px;
            transition: background 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-chat:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
        }

        .chat-message {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .chat-message.client {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.2) 0%, rgba(0, 255, 0, 0.1) 100%);
            align-self: flex-end;
            margin-left: auto;
            border: 1px solid rgba(0, 255, 0, 0.3);
        }

        .chat-message.driver {
            background: linear-gradient(135deg, rgba(0, 200, 0, 0.2) 0%, rgba(0, 200, 0, 0.1) 100%);
            align-self: flex-start;
            border: 1px solid rgba(0, 200, 0, 0.3);
        }

        .chat-message strong {
            display: block;
            margin-bottom: 6px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .chat-message.client strong {
            color: #00ff00;
        }

        .chat-message.driver strong {
            color: #00cc00;
        }

        .chat-message .time {
            font-size: 0.8rem;
            color: #00ff00;
            margin-top: 6px;
            opacity: 0.7;
        }

        .chat-input {
            padding: 20px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #00ff00;
        }

        .chat-input form {
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ff00;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .chat-input button {
            padding: 15px 25px;
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            color: #000000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.4);
        }

        .booking-status {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .booking-status.pending {
            background: linear-gradient(135deg, rgba(255, 165, 0, 0.2) 0%, rgba(255, 165, 0, 0.1) 100%);
            border: 2px solid #ffa500;
            color: #ffa500;
        }

        .booking-status.accepted {
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.2) 0%, rgba(0, 255, 0, 0.1) 100%);
            border: 2px solid #00ff00;
            color: #00ff00;
        }

        .booking-status.rejected {
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2) 0%, rgba(255, 0, 0, 0.1) 100%);
            border: 2px solid #ff4444;
            color: #ff4444;
        }

        /* Mobile Optimizations */
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .form-card {
                padding: 25px 20px;
                border-radius: 20px;
            }
            
            .logo h1 {
                font-size: 2.4rem;
            }
            
            .form-group input {
                padding: 16px 12px;
                font-size: 1rem;
            }
            
            .submit-btn {
                padding: 18px;
                font-size: 1.1rem;
            }
            
            .chat-container {
                height: 90%;
                border-radius: 20px;
            }
            
            .booking-actions {
                flex-direction: column;
            }
            
            .chat-btn {
                padding: 16px;
            }
        }
    </style>
</head>

    <!-- Language Toggle -->
    <div class="language-toggle">
        <button id="pt-btn" class="active">PT</button>
        <button id="en-btn">EN</button>
    </div>

    <!-- Status Indicator -->
    <div class="status-indicator">
        <div class="status-dot"></div>
        <span id="status-text">Conectado</span>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">
        <div id="notification-text">📍 O motorista chegou! Por favor, aguarde.</div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="form-card">
            <div class="logo">
                <h1 id="title">691 Taxi</h1>
                <p id="subtitle">Serviço Premium</p>
            </div>

            <!-- Booking Info -->
            <div id="booking-info" class="booking-info" style="display: none;">
                <h3 id="booking-title">🚕 Reserva Ativa</h3>
                <div id="booking-details"></div>
                <div id="booking-status" class="booking-status pending">
                    ⏳ Aguardando confirmação...
                </div>
                <div class="booking-actions">
                    <button id="chat-btn" class="chat-btn">💬 Chat</button>
                    <button id="cancel-btn" class="cancel-btn">❌ Cancelar</button>
                </div>
            </div>

            <div id="no-bookings" class="no-bookings">
                <span id="no-bookings-text">Sem reservas ativas</span>
            </div>

            <form id="taxi-form">
                <div class="form-group">
                    <label id="name-label" for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label id="phone-label" for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="Seu telefone" required>
                </div>

                <div class="form-group autocomplete-container">
                    <label id="pickup-label" for="recolha">Local de Recolha</label>
                    <input type="text" id="recolha" name="recolha" placeholder="Endereço de recolha" autocomplete="off" required>
                    <div id="recolha-autocomplete" class="autocomplete-list"></div>
                </div>

                <div class="form-group autocomplete-container">
                    <label id="dest-label" for="destino">Destino</label>
                    <input type="text" id="destino" name="destino" placeholder="Endereço de destino" autocomplete="off" required>
                    <div id="destino-autocomplete" class="autocomplete-list"></div>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">Reservar Taxi</button>
            </form>

            <div id="success-message" class="success-message">
                ✅ Reserva enviada com sucesso!
            </div>
        </div>
    </div>

    <!-- Chat Popup -->
    <div id="chat-popup" class="chat-popup">
        <div class="chat-container">
            <div class="chat-header">
                <h3 id="chat-title">💬 Chat com Motorista</h3>
                <button id="close-chat" class="close-chat">×</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div style="text-align: center; color: #00ff00; font-style: italic; padding: 20px;">
                    <span id="chat-placeholder">Nenhuma mensagem ainda</span>
                </div>
            </div>
            <div class="chat-input">
                <form id="chat-form">
                    <input type="text" id="chat-message" placeholder="Digite sua mensagem..." required>
                    <button type="submit">Enviar</button>
                </form>
            </div>
        </div>
    </div>

                notification: '📍 The driver has arrived! Please wait.',
                successMessage: '✅ Booking sent successfully!',
                chatTitle: '💬 Chat with Driver',
                chatPlaceholder: 'No messages yet',
                chatMessagePlaceholder: 'Type your message...',
                bookingTitle: '🚕 Active Booking',
                noBookings: 'No active bookings',
                bookingPending: '⏳ Awaiting confirmation...',
                bookingAccepted: '✅ Booking accepted! Driver on the way.',
                bookingRejected: '❌ Booking rejected. Please try again.',
                bookingCancelled: '❌ Booking cancelled.',
                driverArrived: '📍 The driver has arrived! Please wait.',
                newBooking: '🚕 New booking received!',
                messageFromDriver: '💬 Message from driver:'
            }
        };

        let currentLang = 'pt';
        let socket = null;
        let currentBooking = null;

        // Autocomplete functionality
        function setupAutocomplete(inputId, listId) {
            const input = document.getElementById(inputId);
            const list = document.getElementById(listId);
            let currentFocus = -1;

            input.addEventListener('input', function() {
                const value = this.value.toLowerCase();
                closeAllLists();
                
                if (!value) return;
                
                const matches = portugueseAddresses.filter(addr => 
                    addr.toLowerCase().includes(value)
                ).slice(0, 8);
                
                if (matches.length === 0) return;
                
                list.classList.add('show');
                
                matches.forEach((match, index) => {
                    const item = document.createElement('div');
                    item.className = 'autocomplete-item';
                    item.textContent = match;
                    item.addEventListener('click', function() {
                        input.value = match;
                        closeAllLists();
                    });
                    list.appendChild(item);
                });
            });

            input.addEventListener('keydown', function(e) {
                const items = list.getElementsByClassName('autocomplete-item');
                if (items.length === 0) return;
                
                if (e.keyCode === 40) { // Down
                    currentFocus++;
                    addActive(items);
                } else if (e.keyCode === 38) { // Up
                    currentFocus--;
                    addActive(items);
                } else if (e.keyCode === 13) { // Enter
                    e.preventDefault();
                    if (currentFocus > -1) {
                        items[currentFocus].click();
                    }
                }
            });

            function addActive(items) {
                if (!items) return false;
                removeActive(items);
                if (currentFocus >= items.length) currentFocus = 0;
                if (currentFocus < 0) currentFocus = items.length - 1;
                items[currentFocus].classList.add('active');
            }

            function removeActive(items) {
                for (let item of items) {
                    item.classList.remove('active');
                }
            }

            function closeAllLists() {
                list.classList.remove('show');
                list.innerHTML = '';
                currentFocus = -1;
            }

            document.addEventListener('click', function(e) {
                if (!input.contains(e.target) && !list.contains(e.target)) {
                    closeAllLists();
                }
            });
        }

        // Initialize Socket.io
        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('Conectado ao servidor');
                updateStatus('Conectado');
                showNotification('🟢 Conectado ao servidor 691 Taxi!');
            });

            socket.on('disconnect', () => {
                console.log('Desconectado do servidor');
                updateStatus('Desconectado');
                showNotification('🔴 Desconectado do servidor');
            });

            socket.on('driver_arrived', (data) => {
                showNotification(data.message || translations[currentLang].driverArrived);
                playSound();
            });

            socket.on('new_booking', (data) => {
                showNotification(data.message || translations[currentLang].newBooking);
                displayBooking(data);
                playSound();
            });

            socket.on('booking_accepted', (data) => {
                if (currentBooking && currentBooking.bookingId === data.bookingId) {
                    updateBookingStatus('accepted');
                    showNotification(data.message);
                    playSound();
                }
            });

            socket.on('booking_rejected', (data) => {
                if (currentBooking && currentBooking.bookingId === data.bookingId) {
                    updateBookingStatus('rejected');
                    showNotification(data.message);
                    playSound();
                    setTimeout(() => {
                        hideBooking();
                    }, 3000);
                }
            });

            socket.on('booking_cancelled', (data) => {
                if (currentBooking && currentBooking.bookingId === data.bookingId) {
                    showNotification(data.message);
                    hideBooking();
                    playSound();
                }
            });

            socket.on('message_from_driver', (data) => {
                if (currentBooking && currentBooking.bookingId === data.bookingId) {
                    displayChatMessage({
                        name: data.driverName,
                        message: data.message,
                        type: 'driver'
                    });
                    showNotification(translations[currentLang].messageFromDriver + ' ' + data.message);
                    playSound();
                }
            });
        }

        // Update language
        function updateLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            document.getElementById('title').textContent = t.title;
            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('name-label').textContent = t.nameLabel;
            document.getElementById('phone-label').textContent = t.phoneLabel;
            document.getElementById('pickup-label').textContent = t.pickupLabel;
            document.getElementById('dest-label').textContent = t.destLabel;
            document.getElementById('submit-btn').textContent = t.submitBtn;
            document.getElementById('chat-title').textContent = t.chatTitle;
            document.getElementById('chat-placeholder').textContent = t.chatPlaceholder;
            document.getElementById('chat-message').placeholder = t.chatMessagePlaceholder;
            document.getElementById('booking-title').textContent = t.bookingTitle;
            document.getElementById('no-bookings-text').textContent = t.noBookings;
            document.getElementById('status-text').textContent = t.statusText;

            // Update button states
            document.getElementById('pt-btn').classList.toggle('active', lang === 'pt');
            document.getElementById('en-btn').classList.toggle('active', lang === 'en');
        }

        // Display booking info
        function displayBooking(booking) {
            currentBooking = booking;
            const bookingInfo = document.getElementById('booking-info');
            const noBookings = document.getElementById('no-bookings');
            const bookingDetails = document.getElementById('booking-details');
            
            bookingDetails.innerHTML = `
                <strong>🆔 ID: ${booking.bookingId}</strong><br>
                <strong>👤 ${booking.nome}</strong><br>
                📞 ${booking.telefone}<br>
                📍 ${booking.recolha}<br>
                🎯 ${booking.destino}
            `;
            
            bookingInfo.style.display = 'block';
            noBookings.style.display = 'none';
            updateBookingStatus('pending');
        }

        // Update booking status
        function updateBookingStatus(status) {
            const statusElement = document.getElementById('booking-status');
            const t = translations[currentLang];
            
            statusElement.className = 'booking-status ' + status;
            
            switch(status) {
                case 'pending':
                    statusElement.textContent = t.bookingPending;
                    break;
                case 'accepted':
                    statusElement.textContent = t.bookingAccepted;
                    break;
                case 'rejected':
                    statusElement.textContent = t.bookingRejected;
                    break;
                case 'cancelled':
                    statusElement.textContent = t.bookingCancelled;
                    break;
            }
        }

        // Hide booking
        function hideBooking() {
            const bookingInfo = document.getElementById('booking-info');
            const noBookings = document.getElementById('no-bookings');
            
            bookingInfo.style.display = 'none';
            noBookings.style.display = 'block';
            currentBooking = null;
        }

        // Display chat message
        function displayChatMessage(data) {
            const chatMessages = document.getElementById('chat-messages');
            const placeholder = document.getElementById('chat-placeholder');
            
            // Remove placeholder if exists
            if (placeholder) {
                placeholder.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${data.type || 'client'}`;
            messageDiv.innerHTML = `
                <strong>${data.name}</strong>
                <div>${data.message}</div>
                <div class="time">${new Date().toLocaleTimeString()}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Show notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            document.getElementById('notification-text').textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 5000);
        }

        // Play sound
        function playSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Update status
        function updateStatus(text) {
            document.getElementById('status-text').textContent = text;
        }

        // Handle form submission
        document.getElementById('taxi-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                nome: formData.get('nome'),
                telefone: formData.get('telefone'),
                recolha: formData.get('recolha'),
                destino: formData.get('destino')
            };

            try {
                const response = await fetch('/api/reserva', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    console.log('Reserva enviada:', result);
                    
                    // Show success message
                    const successMsg = document.getElementById('success-message');
                    successMsg.classList.add('show');
                    
                    // Display booking with ID from server
                    displayBooking({
                        ...data,
                        bookingId: result.bookingId
                    });
                    
                    // Reset form
                    e.target.reset();
                    
                    // Hide success message after 3 seconds
                    setTimeout(() => {
                        successMsg.classList.remove('show');
                    }, 3000);
                } else {
                    console.error('Erro ao enviar reserva');
                    showNotification('❌ Erro ao enviar reserva');
                }
            } catch (error) {
                console.error('Erro:', error);
                showNotification('❌ Erro de conexão');
            }
        });

        // Handle chat form submission
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = document.getElementById('chat-message').value.trim();
            if (!message || !currentBooking) return;
            
            // Send via Socket.io
            socket.emit('message_to_driver', {
                name: currentBooking.nome,
                phone: currentBooking.telefone,
                bookingId: currentBooking.bookingId,
                message: message
            });
            
            // Display as own message
            displayChatMessage({
                name: 'Você',
                message: message,
                type: 'client'
            });
            
            // Clear form
            document.getElementById('chat-message').value = '';
        });

        // Chat popup controls
        document.getElementById('chat-btn').addEventListener('click', () => {
            document.getElementById('chat-popup').classList.add('show');
        });

        document.getElementById('close-chat').addEventListener('click', () => {
            document.getElementById('chat-popup').classList.remove('show');
        });

        // Cancel booking
        document.getElementById('cancel-btn').addEventListener('click', () => {
            if (currentBooking) {
                socket.emit('cancel_booking', {
                    bookingId: currentBooking.bookingId,
                    name: currentBooking.nome,
                    phone: currentBooking.telefone
                });
                
                updateBookingStatus('cancelled');
                setTimeout(() => {
                    hideBooking();
                }, 2000);
            }
        });

        // Language toggle handlers
        document.getElementById('pt-btn').addEventListener('click', () => {
            updateLanguage('pt');
        });

        document.getElementById('en-btn').addEventListener('click', () => {
            updateLanguage('en');
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initSocket();
            updateLanguage('pt');
            setupAutocomplete('recolha', 'recolha-autocomplete');
            setupAutocomplete('destino', 'destino-autocomplete');
        });
    </script>
</body>
</html>

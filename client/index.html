<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#004d00" />
    <meta name="description" content="Serviço de taxi premium com reserva instantânea e acompanhamento em tempo real" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="691 Taxi" />
    <meta name="application-name" content="691 Taxi" />
    <meta name="msapplication-TileColor" content="#004d00" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    
    <!-- Preconnect para APIs externas -->
    <link rel="preconnect" href="https://api.tomtom.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    
    <title>691 Taxi - Serviço Premium</title>
    
    <!-- Estilos críticos inline para evitar FOUC -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background: #000000;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
      }
      
      #root {
        width: 100vw;
        height: 100vh;
      }
      
      /* Loading spinner */
      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0, 77, 0, 0.3);
        border-top: 3px solid #004d00;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
      }
      
      /* Splash screen para PWA */
      .splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .splash-logo {
        font-size: 3rem;
        font-weight: bold;
        color: #004d00;
        margin-bottom: 1rem;
      }
      
      .splash-text {
        color: #004d00;
        opacity: 0.7;
        font-size: 0.9rem;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash" class="splash">
      <div class="splash-logo">691</div>
      <div class="splash-text">Serviço de Taxi Premium</div>
    </div>
    
    <!-- Loading -->
    <div id="loading" class="loading" style="display: none;"></div>
    
    <!-- App Container -->
    <div id="root"></div>
    
    <!-- Service Worker Registration -->
    <script>
      // Registrar Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
              
              // Verificar por atualizações
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // Nova versão disponível
                      if (confirm('Nova versão disponível! Deseja atualizar?')) {
                        window.location.reload();
                      }
                    }
                  });
                }
              });
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
      
      // Esconder splash screen quando app carregar
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            splash.style.transition = 'opacity 0.3s ease-out';
            setTimeout(() => {
              splash.style.display = 'none';
            }, 300);
          }
        }, 200); // Reduzir para 200ms
      });
      
      // Fallback imediato
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash && splash.style.display !== 'none') {
          splash.style.opacity = '0';
          splash.style.transition = 'opacity 0.2s ease-out';
          setTimeout(() => {
            if (splash) {
              splash.style.display = 'none';
            }
          }, 200);
        }
      }, 1000);
      
      // Detectar standalone mode (PWA)
      window.addEventListener('DOMContentLoaded', () => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                           (window.navigator as any).standalone;
        
        if (isStandalone) {
          document.documentElement.classList.add('pwa-standalone');
        }
      });
      
      // Handle online/offline status
      window.addEventListener('online', () => {
        console.log('App is online');
        document.body.classList.remove('offline');
      });
      
      window.addEventListener('offline', () => {
        console.log('App is offline');
        document.body.classList.add('offline');
      });
      
      // Prevenir zoom em iOS
      document.addEventListener('gesturestart', (e) => {
        e.preventDefault();
      });
      
      // Handle visibility change (para pausar/reiniciar atividades)
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          console.log('App is hidden');
        } else {
          console.log('App is visible');
        }
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
